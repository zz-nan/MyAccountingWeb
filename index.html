<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>收支账单录入 - GitHub 同步版</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body {
            background-color: #f8f9fa;
        }
        .container {
            margin-top: 50px;
            max-width: 600px;
        }
        .card {
            border: none;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }
        .btn-primary {
            background-color: #007bff;
            border: none;
        }
        .btn-secondary {
            border: none;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .stat-card.income {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }
        .stat-card.expense {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
        }
        .stat-card.balance {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }
        .stat-card.top {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        }
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            margin: 10px 0;
        }
        .stat-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        .chart-container {
            height: 400px;
            margin-top: 20px;
        }
        .loading-text {
            text-align: center;
            padding: 50px;
            color: #6c757d;
        }
        .table-container {
            max-height: 267px;
            overflow-y: auto;
        }
        .table-container thead th {
            position: sticky;
            top: 0;
            background-color: #f8f9fa;
            z-index: 1;
        }
        .btn-sm {
            padding: 0.25rem 0.5rem;
            font-size: 0.875rem;
        }
        .action-buttons {
            display: flex;
            gap: 5px;
        }
        .sync-status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 10px 20px;
            border-radius: 5px;
            color: white;
            font-weight: bold;
            display: none;
            z-index: 1000;
        }
        .sync-status.success {
            background-color: #28a745;
        }
        .sync-status.error {
            background-color: #dc3545;
        }
        .sync-status.syncing {
            background-color: #ffc107;
            color: #000;
        }
        .config-section {
            background-color: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .github-connected {
            background-color: #d4edda;
            border-color: #28a745;
        }
    </style>
</head>
<body>
    <!-- GitHub 配置区域 -->
    <div class="container">
        <div class="card config-section" id="configSection">
            <div class="card-body">
                <h6 class="card-title">
                    <span id="configIcon">⚙️</span> GitHub 配置
                    <button class="btn btn-sm btn-link float-end" type="button" data-bs-toggle="collapse" data-bs-target="#configForm">
                        <span id="configToggleText">展开</span>
                    </button>
                </h6>
                <div class="collapse" id="configForm">
                    <div class="mb-2">
                        <label class="form-label">GitHub 用户名</label>
                        <input type="text" class="form-control form-control-sm" id="githubUsername" placeholder="例如: zz-nan">
                    </div>
                    <div class="mb-2">
                        <label class="form-label">仓库名称</label>
                        <input type="text" class="form-control form-control-sm" id="githubRepo" placeholder="例如: MyAccountingData">
                    </div>
                    <div class="mb-2">
                        <label class="form-label">
                            Personal Access Token
                            <a href="https://github.com/settings/tokens/new" target="_blank" class="btn btn-sm btn-outline-primary ms-2">获取 Token</a>
                        </label>
                        <input type="password" class="form-control form-control-sm" id="githubToken" placeholder="ghp_xxxxxxxxxxxx">
                        <small class="text-muted">Token 需要 repo 权限</small>
                    </div>
                    <div class="mb-2">
                        <label class="form-label">Excel 文件路径</label>
                        <input type="text" class="form-control form-control-sm" id="excelPath" value="data/收支账单.xlsx">
                    </div>
                    <div class="mb-2 form-check">
                        <input type="checkbox" class="form-check-input" id="autoBackup" checked>
                        <label class="form-check-label" for="autoBackup">
                            启用自动备份（每次保存数据时自动下载备份文件）
                        </label>
                    </div>
                    <button class="btn btn-sm btn-primary" onclick="saveConfig()">保存配置</button>
                    <button class="btn btn-sm btn-success" onclick="testConnection()">测试连接</button>
                    <button class="btn btn-sm btn-info" onclick="loadFromGitHub()">从 GitHub 加载</button>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header text-center bg-primary text-white">
                <div class="d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">收支账单录入</h5>
                    <div>
                        <button class="btn btn-light btn-sm" onclick="exportBackup()">📥 导出备份</button>
                        <button class="btn btn-light btn-sm" onclick="importBackup()">📤 导入备份</button>
                        <button class="btn btn-light btn-sm" onclick="syncToGitHub()">🔄 同步到 GitHub</button>
                    </div>
                </div>
            </div>
            <div class="card-body">
                <form id="billForm">
                    <div class="mb-3">
                        <label for="date" class="form-label">日期</label>
                        <input type="date" class="form-control" id="date" required value="">
                    </div>
                    <div class="mb-3">
                        <label for="type" class="form-label">类型</label>
                        <select class="form-control" id="type" required>
                            <option value="支出" selected>支出</option>
                            <option value="收入">收入</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="category" class="form-label">分类</label>
                        <select class="form-control" id="category" required>
                            <option value="">请选择分类</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="amount" class="form-label">金额</label>
                        <input type="number" class="form-control" id="amount" required step="0.01" min="0">
                    </div>
                    <div class="mb-3">
                        <label for="note" class="form-label">备注</label>
                        <textarea class="form-control" id="note" rows="2"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100" id="submitBtn">提交</button>
                    <button type="button" class="btn btn-secondary w-100 mt-2" id="cancelBtn" style="display: none;" onclick="cancelEdit()">取消编辑</button>
                </form>
            </div>
        </div>

        <!-- 账单列表 -->
        <div class="card mt-4">
            <div class="card-header bg-light">
                <div class="d-flex justify-content-between align-items-center">
                    <h6 class="mb-0">账单列表</h6>
                    <input type="month" class="form-control form-control-sm" id="monthFilter" style="width: auto;">
                </div>
            </div>
            <div class="card-body p-0">
                <div class="table-container">
                    <table class="table table-striped mb-0">
                        <thead>
                            <tr>
                                <th>日期</th>
                                <th>类型</th>
                                <th>分类</th>
                                <th>金额</th>
                                <th>备注</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="billList">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 月度收支分析 -->
        <div class="card mt-4">
            <div class="card-header bg-light">
                <h6 class="mb-0">月度收支分析</h6>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-6">
                        <div class="stat-card income">
                            <div class="stat-label">总收入</div>
                            <div class="stat-value" id="totalIncome">¥0.00</div>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="stat-card expense">
                            <div class="stat-label">总支出</div>
                            <div class="stat-value" id="totalExpense">¥0.00</div>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-6">
                        <div class="stat-card balance">
                            <div class="stat-label">收支差额</div>
                            <div class="stat-value" id="balance">¥0.00</div>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="stat-card top">
                            <div class="stat-label">支出最高分类</div>
                            <div class="stat-value" id="topExpenseCategory">-</div>
                            <div class="stat-label" id="topExpenseAmount">¥0.00</div>
                        </div>
                    </div>
                </div>

                <!-- 图表区域 -->
                <div class="row mt-4">
                    <div class="col-12">
                        <div class="card">
                            <div class="card-header">
                                <h6 class="mb-0">支出分类占比</h6>
                            </div>
                            <div class="card-body">
                                <div id="pieChart" class="chart-container"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 同步状态提示 -->
    <div class="sync-status" id="syncStatus"></div>

    <script>
        // ==================== 常量定义 ====================
        const CONFIG_KEY = 'github_config';
        const DATA_KEY = 'accounting_data';
        const BACKUP_KEY = 'accounting_backup';
        const HEADERS = ["日期", "类型", "分类", "金额", "备注"];
        const SHEET_NAME = "账单明细";

        // 收入分类
        const INCOME_CATEGORIES = ["薪资", "投资收益", "其他"];

        // 支出分类
        const EXPENSE_CATEGORIES = ["房租", "房贷", "餐饮", "交通", "日用品", "水电燃气", "购物", "汽车", "医疗", "其他"];

        // ==================== 全局变量 ====================
        let billData = [];
        let isEditMode = false;
        let currentEditIndex = -1;
        let pieChart = null;

        // ==================== 本地存储管理 ====================
        function saveToLocalStorage(data) {
            try {
                localStorage.setItem(DATA_KEY, JSON.stringify(data));
                console.log('数据已保存到本地存储');
                // 同时触发自动备份
                autoBackupToFile(data);
            } catch (error) {
                console.error('保存到本地存储失败:', error);
            }
        }

        function loadFromLocalStorage() {
            try {
                const savedData = localStorage.getItem(DATA_KEY);
                if (savedData) {
                    return JSON.parse(savedData);
                }
            } catch (error) {
                console.error('从本地存储加载失败:', error);
            }
            return null;
        }

        // ==================== 本地文件备份管理 ====================
        let autoBackupEnabled = false;
        let lastBackupTime = null;

        // 自动备份到本地下载文件
        function autoBackupToFile(data) {
            if (!autoBackupEnabled) return;

            const now = new Date();
            // 防止频繁备份，至少间隔 30 秒
            if (lastBackupTime && (now - lastBackupTime) < 30000) {
                return;
            }
            lastBackupTime = now;

            try {
                const backupData = {
                    version: '1.0',
                    timestamp: now.toISOString(),
                    data: data
                };

                const blob = new Blob([JSON.stringify(backupData, null, 2)], {
                    type: 'application/json'
                });

                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `账单备份_${now.getFullYear()}${String(now.getMonth() + 1).padStart(2, '0')}${String(now.getDate()).padStart(2, '0')}_${String(now.getHours()).padStart(2, '0')}${String(now.getMinutes()).padStart(2, '0')}${String(now.getSeconds()).padStart(2, '0')}.json`;
                a.click();
                URL.revokeObjectURL(url);

                console.log('自动备份文件已创建');
            } catch (error) {
                console.error('自动备份失败:', error);
            }
        }

        // 手动导出备份文件
        function exportBackup() {
            const backupData = {
                version: '1.0',
                timestamp: new Date().toISOString(),
                data: billData
            };

            const blob = new Blob([JSON.stringify(backupData, null, 2)], {
                type: 'application/json'
            });

            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            const now = new Date();
            a.download = `账单备份_${now.getFullYear()}${String(now.getMonth() + 1).padStart(2, '0')}${String(now.getDate()).padStart(2, '0')}_${String(now.getHours()).padStart(2, '0')}${String(now.getMinutes()).padStart(2, '0')}${String(now.getSeconds()).padStart(2, '0')}.json`;
            a.click();
            URL.revokeObjectURL(url);

            alert('备份文件已导出！');
        }

        // 导入备份文件
        function importBackup() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';

            input.onchange = function(e) {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const backupData = JSON.parse(e.target.result);

                        if (!backupData.data || !Array.isArray(backupData.data)) {
                            alert('备份文件格式不正确！');
                            return;
                        }

                        const confirmMsg = `备份时间: ${backupData.timestamp || '未知'}\n包含 ${backupData.data.length} 条记录\n\n确认要恢复此备份吗？（当前数据将被替换）`;
                        if (!confirm(confirmMsg)) {
                            return;
                        }

                        billData = backupData.data;
                        saveToLocalStorage(billData);
                        loadBillList();
                        loadAnalysis();

                        alert('数据恢复成功！');

                        // 如果配置了 GitHub，询问是否同步到云端
                        const config = getGitHubConfig();
                        if (config && confirm('是否同步到 GitHub？')) {
                            syncToGitHub();
                        }
                    } catch (error) {
                        alert('导入失败：' + error.message);
                    }
                };

                reader.readAsText(file);
            };

            input.click();
        }

        // 从备份文件恢复（页面加载时检查）
        function checkBackupFile() {
            const lastBackup = localStorage.getItem(BACKUP_KEY);
            return lastBackup ? JSON.parse(lastBackup) : null;
        }

        // ==================== GitHub API ====================
        function getGitHubConfig() {
            const config = localStorage.getItem(CONFIG_KEY);
            return config ? JSON.parse(config) : null;
        }

        function saveGitHubConfig(config) {
            localStorage.setItem(CONFIG_KEY, JSON.stringify(config));
        }

        async function githubAPIRequest(endpoint, method = 'GET', body = null) {
            const config = getGitHubConfig();
            if (!config) {
                throw new Error('请先配置 GitHub 信息');
            }

            const headers = {
                'Authorization': `Bearer ${config.token}`,
                'Accept': 'application/vnd.github.v3+json',
                'Content-Type': 'application/json',
            };

            const options = {
                method,
                headers,
            };

            if (body) {
                options.body = JSON.stringify(body);
            }

            const response = await fetch(`https://api.github.com${endpoint}`, options);

            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.message || 'GitHub API 请求失败');
            }

            return response.json();
        }

        async function getFileFromGitHub() {
            const config = getGitHubConfig();
            try {
                // 确保路径不以斜杠开头
                const cleanPath = config.excelPath.replace(/^\/+/, '');
                const encodedPath = cleanPath.split('/').map(encodeURIComponent).join('/');
                const data = await githubAPIRequest(`/repos/${config.username}/${config.repo}/contents/${encodedPath}`);

                // 解码 base64 内容
                const content = atob(data.content);
                const workbook = XLSX.read(content, { type: 'binary' });
                const worksheet = workbook.Sheets[SHEET_NAME];

                if (!worksheet) {
                    return [];
                }

                const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: HEADERS });
                // 跳过标题行
                return jsonData.slice(1);
            } catch (error) {
                if (error.message.includes('Not Found')) {
                    // 文件不存在，返回空数组
                    return [];
                }
                throw error;
            }
        }

        async function saveFileToGitHub(data) {
            const config = getGitHubConfig();

            // 创建工作簿
            const workbook = XLSX.utils.book_new();
            const worksheet = XLSX.utils.json_to_sheet([HEADERS, ...data]);
            XLSX.utils.book_append_sheet(workbook, worksheet, SHEET_NAME);

            // 生成 Excel 文件
            const excelBuffer = XLSX.write(workbook, { bookType: 'xlsx', type: 'binary' });

            // 转换为 base64
            const base64Content = btoa(excelBuffer);

            // 获取当前文件 SHA（如果存在）
            let sha = null;
            try {
                const cleanPath = config.excelPath.replace(/^\/+/, '');
                const encodedPath = cleanPath.split('/').map(encodeURIComponent).join('/');
                const fileData = await githubAPIRequest(`/repos/${config.username}/${config.repo}/contents/${encodedPath}`);
                sha = fileData.sha;
            } catch (error) {
                // 文件不存在，不需要 SHA
            }

            // 提交到 GitHub
            const message = `Update accounting data ${new Date().toISOString()}`;
            const body = {
                message,
                content: base64Content,
                sha,
            };

            const cleanPath = config.excelPath.replace(/^\/+/, '');
            const encodedPath = cleanPath.split('/').map(encodeURIComponent).join('/');
            await githubAPIRequest(`/repos/${config.username}/${config.repo}/contents/${encodedPath}`, 'PUT', body);
        }

        // ==================== UI 操作 ====================
        function showSyncStatus(message, type = 'success') {
            const statusEl = document.getElementById('syncStatus');
            statusEl.textContent = message;
            statusEl.className = `sync-status ${type}`;
            statusEl.style.display = 'block';

            setTimeout(() => {
                statusEl.style.display = 'none';
            }, 3000);
        }

        function updateConfigUI() {
            const config = getGitHubConfig();
            const configSection = document.getElementById('configSection');
            const configIcon = document.getElementById('configIcon');

            // 读取自动备份设置（从单独的 localStorage 键读取）
            const autoBackupSetting = localStorage.getItem('autoBackupEnabled');

            if (config) {
                configSection.classList.add('github-connected');
                configSection.classList.remove('config-section');
                configIcon.textContent = '✅';

                // 填充表单
                document.getElementById('githubUsername').value = config.username || '';
                document.getElementById('githubRepo').value = config.repo || '';
                document.getElementById('githubToken').value = config.token || '';
                document.getElementById('excelPath').value = config.excelPath || 'data/收支账单.xlsx';
                // 优先使用配置中的设置，否则使用独立的自动备份设置
                document.getElementById('autoBackup').checked = config.autoBackup !== false;
                autoBackupEnabled = config.autoBackup !== false;
            } else {
                // 未配置 GitHub，使用独立的自动备份设置
                document.getElementById('autoBackup').checked = autoBackupSetting === 'true';
                autoBackupEnabled = autoBackupSetting === 'true';
            }
        }

        function saveConfig() {
            let excelPath = document.getElementById('excelPath').value.trim();
            // 移除路径开头的斜杠
            excelPath = excelPath.replace(/^\/+/, '');

            const autoBackup = document.getElementById('autoBackup').checked;

            // 保存自动备份设置到独立的 localStorage 键
            localStorage.setItem('autoBackupEnabled', autoBackup);

            const config = {
                username: document.getElementById('githubUsername').value.trim(),
                repo: document.getElementById('githubRepo').value.trim(),
                token: document.getElementById('githubToken').value.trim(),
                excelPath: excelPath,
                autoBackup: autoBackup,
            };

            if (!config.username || !config.repo || !config.token) {
                // 只保存自动备份设置，不保存 GitHub 配置
                autoBackupEnabled = autoBackup;
                alert('自动备份设置已保存');
                return;
            }

            saveGitHubConfig(config);
            autoBackupEnabled = config.autoBackup;
            updateConfigUI();
            alert('配置已保存');
        }

        async function testConnection() {
            try {
                showSyncStatus('测试连接中...', 'syncing');
                const config = getGitHubConfig();
                await githubAPIRequest(`/repos/${config.username}/${config.repo}`);
                showSyncStatus('连接成功！', 'success');
            } catch (error) {
                showSyncStatus(`连接失败: ${error.message}`, 'error');
            }
        }

        async function loadFromGitHub() {
            try {
                showSyncStatus('从 GitHub 加载中...', 'syncing');
                billData = await getFileFromGitHub();
                saveToLocalStorage(billData);
                loadBillList();
                loadAnalysis();
                showSyncStatus('加载成功！', 'success');
            } catch (error) {
                showSyncStatus(`加载失败: ${error.message}`, 'error');
            }
        }

        async function syncToGitHub() {
            try {
                showSyncStatus('同步到 GitHub 中...', 'syncing');
                await saveFileToGitHub(billData);
                showSyncStatus('同步成功！', 'success');
            } catch (error) {
                showSyncStatus(`同步失败: ${error.message}`, 'error');
            }
        }

        // ==================== 数据操作 ====================
        function addRecord(record) {
            billData.push(record);
            saveToLocalStorage(billData);
        }

        function updateRecord(index, record) {
            billData[index] = record;
            saveToLocalStorage(billData);
        }

        async function deleteRecord(index) {
            if (confirm('确定要删除这条记录吗？')) {
                billData.splice(index, 1);
                saveToLocalStorage(billData);
                loadBillList();
                loadAnalysis();

                // 自动同步到 GitHub（如果已配置）
                const config = getGitHubConfig();
                if (config) {
                    try {
                        showSyncStatus('删除后同步中...', 'syncing');
                        await saveFileToGitHub(billData);
                        showSyncStatus('删除并同步成功！', 'success');
                    } catch (error) {
                        showSyncStatus(`同步失败: ${error.message}`, 'error');
                    }
                }
            }
        }

        // ==================== 初始化 ====================
        document.addEventListener("DOMContentLoaded", async () => {
            initCharts();
            updateCategoryOptions();
            setDefaultDate();
            setDefaultMonth();
            updateConfigUI();

            // 监听类型变化
            document.getElementById('type').addEventListener('change', updateCategoryOptions);

            // 监听月份筛选变化
            document.getElementById('monthFilter').addEventListener('change', () => {
                loadBillList();
                loadAnalysis();
            });

            // 表单提交
            document.getElementById('billForm').addEventListener('submit', handleSubmit);

            // 优先从本地存储加载数据（确保历史数据不会丢失）
            const localData = loadFromLocalStorage();
            if (localData && localData.length > 0) {
                billData = localData;
                loadBillList();
                loadAnalysis();
                console.log(`已从本地存储加载 ${billData.length} 条记录`);
            } else if (localData && localData.length === 0) {
                // 有本地存储但数据为空，初始化空数组
                billData = [];
                loadBillList();
                loadAnalysis();
            }

            // 如果配置了 GitHub，尝试从 GitHub 同步更新数据
            const config = getGitHubConfig();
            if (config) {
                try {
                    showSyncStatus('从 GitHub 同步数据中...', 'syncing');
                    const githubData = await getFileFromGitHub();

                    // 合并策略：如果 GitHub 有更多数据，使用 GitHub 的数据
                    if (githubData.length > billData.length) {
                        billData = githubData;
                        saveToLocalStorage(billData);
                        console.log(`从 GitHub 同步了 ${billData.length} 条记录`);
                    } else {
                        console.log(`使用本地数据（${billData.length} 条），GitHub 数据较旧`);
                    }

                    loadBillList();
                    loadAnalysis();
                    showSyncStatus('数据同步成功！', 'success');
                } catch (error) {
                    // GitHub 加载失败，继续使用本地数据
                    console.log('GitHub 同步失败，使用本地数据:', error.message);
                    showSyncStatus(`GitHub 同步失败: ${error.message}，使用本地数据`, 'error');
                }
            }

            // 显示数据保护提示
            showDataProtectionTip();
        });

        // 显示数据保护提示（首次加载或数据为空时）
        function showDataProtectionTip() {
            const tipKey = 'data_protection_tip_shown';
            const tipShown = localStorage.getItem(tipKey);

            if (!tipShown) {
                setTimeout(() => {
                    const message = `💡 数据保护提示：

您的数据安全非常重要！我们提供多层保护：

✅ 自动保存：所有数据自动保存到浏览器本地存储
📥 手动备份：建议定期点击"导出备份"按钮下载备份文件
📤 数据恢复：如需恢复数据，点击"导入备份"选择备份文件即可
🔄 云端同步：配置 GitHub 后可自动同步到云端

即使清除浏览器数据，也可以通过备份文件或 GitHub 恢复所有记录！

此提示仅显示一次`;
                    alert(message);
                    localStorage.setItem(tipKey, 'true');
                }, 1000);
            }
        }

        function initCharts() {
            pieChart = echarts.init(document.getElementById('pieChart'));
            window.addEventListener('resize', () => {
                pieChart.resize();
            });
        }

        function setDefaultDate() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('date').value = today;
        }

        function setDefaultMonth() {
            const currentMonth = new Date().toISOString().slice(0, 7);
            document.getElementById('monthFilter').value = currentMonth;
        }

        function updateCategoryOptions() {
            const type = document.getElementById('type').value;
            const categorySelect = document.getElementById('category');

            categorySelect.innerHTML = '<option value="">请选择分类</option>';

            const categories = type === '收入' ? INCOME_CATEGORIES : EXPENSE_CATEGORIES;

            categories.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat;
                option.textContent = cat;
                categorySelect.appendChild(option);
            });
        }

        async function handleSubmit(e) {
            e.preventDefault();

            const formData = {
                日期: document.getElementById('date').value,
                类型: document.getElementById('type').value,
                分类: document.getElementById('category').value,
                金额: parseFloat(document.getElementById('amount').value).toFixed(2),
                备注: document.getElementById('note').value
            };

            if (isEditMode) {
                updateRecord(currentEditIndex, formData);
                alert('账单更新成功！');
                cancelEdit();
            } else {
                addRecord(formData);
                alert('账单添加成功！');
                resetForm();
            }

            loadBillList();
            loadAnalysis();

            // 自动同步到 GitHub（如果已配置）
            const config = getGitHubConfig();
            if (config) {
                try {
                    showSyncStatus('自动同步中...', 'syncing');
                    await saveFileToGitHub(billData);
                    showSyncStatus('账单保存并同步成功！', 'success');
                } catch (error) {
                    showSyncStatus(`同步失败: ${error.message}`, 'error');
                }
            }
        }

        function editRecord(index) {
            const record = billData[index];
            if (!record) return;

            document.getElementById('date').value = record.日期;
            document.getElementById('type').value = record.类型;
            updateCategoryOptions();
            document.getElementById('category').value = record.分类;
            document.getElementById('amount').value = record.金额;
            document.getElementById('note').value = record.备注 || '';

            isEditMode = true;
            currentEditIndex = index;
            document.getElementById('submitBtn').textContent = '更新';
            document.getElementById('cancelBtn').style.display = 'block';

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function cancelEdit() {
            isEditMode = false;
            currentEditIndex = -1;
            document.getElementById('submitBtn').textContent = '提交';
            document.getElementById('cancelBtn').style.display = 'none';
            resetForm();
        }

        function resetForm() {
            document.getElementById('billForm').reset();
            setDefaultDate();
            updateCategoryOptions();
        }

        function loadBillList() {
            const month = document.getElementById('monthFilter').value;
            const tbody = document.getElementById('billList');

            let filteredData = billData;
            if (month) {
                filteredData = billData.filter(item => item.日期 && item.日期.startsWith(month));
            }

            filteredData.sort((a, b) => new Date(b.日期) - new Date(a.日期));

            tbody.innerHTML = '';

            if (filteredData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">暂无数据</td></tr>';
                return;
            }

            filteredData.forEach((item) => {
                const index = billData.indexOf(item);

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${item.日期}</td>
                    <td><span class="badge ${item.类型 === '收入' ? 'bg-success' : 'bg-danger'}">${item.类型}</span></td>
                    <td>${item.分类}</td>
                    <td>¥${parseFloat(item.金额).toFixed(2)}</td>
                    <td>${item.备注 || '-'}</td>
                    <td>
                        <div class="action-buttons">
                            <button class="btn btn-sm btn-primary" onclick="editRecord(${index})">编辑</button>
                            <button class="btn btn-sm btn-danger" onclick="deleteRecord(${index})">删除</button>
                        </div>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function loadAnalysis() {
            const month = document.getElementById('monthFilter').value;

            let totalIncome = 0;
            let totalExpense = 0;
            let expenseCategories = {};

            billData.forEach(item => {
                if (!month || (item.日期 && item.日期.startsWith(month))) {
                    if (item.类型 === '收入') {
                        totalIncome += parseFloat(item.金额);
                    } else if (item.类型 === '支出') {
                        totalExpense += parseFloat(item.金额);

                        if (!expenseCategories[item.分类]) {
                            expenseCategories[item.分类] = 0;
                        }
                        expenseCategories[item.分类] += parseFloat(item.金额);
                    }
                }
            });

            const balance = totalIncome - totalExpense;

            let topExpenseCategory = '-';
            let topExpenseAmount = 0;
            const categoryEntries = Object.entries(expenseCategories);
            if (categoryEntries.length > 0) {
                const [topCat, topAmt] = categoryEntries.reduce((a, b) => b[1] > a[1] ? b : a);
                topExpenseCategory = topCat;
                topExpenseAmount = topAmt;
            }

            document.getElementById('totalIncome').textContent = `¥${totalIncome.toFixed(2)}`;
            document.getElementById('totalExpense').textContent = `¥${totalExpense.toFixed(2)}`;
            document.getElementById('balance').textContent = `¥${balance.toFixed(2)}`;
            document.getElementById('topExpenseCategory').textContent = topExpenseCategory;
            document.getElementById('topExpenseAmount').textContent = `¥${topExpenseAmount.toFixed(2)}`;

            updateCharts(expenseCategories);
        }

        function updateCharts(expenseCategories) {
            const data = Object.entries(expenseCategories).map(([name, value]) => ({
                name,
                value: parseFloat(value.toFixed(2))
            }));

            data.sort((a, b) => b.value - a.value);

            const option = {
                tooltip: {
                    trigger: 'item',
                    formatter: '{a} <br/>{b}: ¥{c} ({d}%)'
                },
                legend: {
                    orient: 'vertical',
                    left: 'left',
                    top: 'middle'
                },
                series: [
                    {
                        name: '支出分类',
                        type: 'pie',
                        radius: ['40%', '70%'],
                        avoidLabelOverlap: false,
                        itemStyle: {
                            borderRadius: 10,
                            borderColor: '#fff',
                            borderWidth: 2
                        },
                        label: {
                            show: false,
                            position: 'center'
                        },
                        emphasis: {
                            label: {
                                show: true,
                                fontSize: 20,
                                fontWeight: 'bold'
                            }
                        },
                        labelLine: {
                            show: false
                        },
                        data: data
                    }
                ]
            };

            pieChart.setOption(option);
        }
    </script>
</body>
</html>

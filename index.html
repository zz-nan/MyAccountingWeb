<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>收支账单录入</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body {
            background-color: #f8f9fa;
        }
        .container {
            margin-top: 50px;
            max-width: 600px;
        }
        .card {
            border: none;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }
        .btn-primary {
            background-color: #007bff;
            border: none;
        }
        .btn-secondary {
            border: none;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .stat-card.income {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }
        .stat-card.expense {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
        }
        .stat-card.balance {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }
        .stat-card.top {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        }
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            margin: 10px 0;
        }
        .stat-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        .chart-container {
            height: 400px;
            margin-top: 20px;
        }
        .loading-text {
            text-align: center;
            padding: 50px;
            color: #6c757d;
        }
        .table-container {
            max-height: 267px;
            overflow-y: auto;
        }
        .table-container thead th {
            position: sticky;
            top: 0;
            background-color: #f8f9fa;
            z-index: 1;
        }
        .btn-sm {
            padding: 0.25rem 0.5rem;
            font-size: 0.875rem;
        }
        .action-buttons {
            display: flex;
            gap: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header text-center bg-primary text-white">
                <div class="d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">收支账单录入</h5>
                    <button class="btn btn-light btn-sm" onclick="exportData()">导出数据</button>
                </div>
            </div>
            <div class="card-body">
                <form id="billForm">
                    <div class="mb-3">
                        <label for="date" class="form-label">日期</label>
                        <input type="date" class="form-control" id="date" required value="">
                    </div>
                    <div class="mb-3">
                        <label for="type" class="form-label">类型</label>
                        <select class="form-control" id="type" required>
                            <option value="支出" selected>支出</option>
                            <option value="收入">收入</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="category" class="form-label">分类</label>
                        <select class="form-control" id="category" required>
                            <option value="">请选择分类</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="amount" class="form-label">金额</label>
                        <input type="number" class="form-control" id="amount" required step="0.01" min="0">
                    </div>
                    <div class="mb-3">
                        <label for="note" class="form-label">备注</label>
                        <textarea class="form-control" id="note" rows="2"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100" id="submitBtn">提交</button>
                    <button type="button" class="btn btn-secondary w-100 mt-2" id="cancelBtn" style="display: none;" onclick="cancelEdit()">取消编辑</button>
                </form>
            </div>
        </div>

        <!-- 账单列表 -->
        <div class="card mt-4">
            <div class="card-header bg-light">
                <div class="d-flex justify-content-between align-items-center">
                    <h6 class="mb-0">账单列表</h6>
                    <input type="month" class="form-control form-control-sm" id="monthFilter" style="width: auto;">
                </div>
            </div>
            <div class="card-body p-0">
                <div class="table-container">
                    <table class="table table-striped mb-0">
                        <thead>
                            <tr>
                                <th>日期</th>
                                <th>类型</th>
                                <th>分类</th>
                                <th>金额</th>
                                <th>备注</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="billList">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 月度收支分析 -->
        <div class="card mt-4">
            <div class="card-header bg-light">
                <h6 class="mb-0">月度收支分析</h6>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-6">
                        <div class="stat-card income">
                            <div class="stat-label">总收入</div>
                            <div class="stat-value" id="totalIncome">¥0.00</div>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="stat-card expense">
                            <div class="stat-label">总支出</div>
                            <div class="stat-value" id="totalExpense">¥0.00</div>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-6">
                        <div class="stat-card balance">
                            <div class="stat-label">收支差额</div>
                            <div class="stat-value" id="balance">¥0.00</div>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="stat-card top">
                            <div class="stat-label">支出最高分类</div>
                            <div class="stat-value" id="topExpenseCategory">-</div>
                            <div class="stat-label" id="topExpenseAmount">¥0.00</div>
                        </div>
                    </div>
                </div>

                <!-- 图表区域 -->
                <div class="row mt-4">
                    <div class="col-12">
                        <div class="card">
                            <div class="card-header">
                                <h6 class="mb-0">支出分类占比</h6>
                            </div>
                            <div class="card-body">
                                <div id="pieChart" class="chart-container"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== 数据管理 ====================
        const STORAGE_KEY = 'my_accounting_data';
        const HEADERS = ["日期", "类型", "分类", "金额", "备注"];

        // 收入分类
        const INCOME_CATEGORIES = ["薪资", "投资收益", "其他"];

        // 支出分类
        const EXPENSE_CATEGORIES = ["房租", "房贷", "餐饮", "交通", "日用品", "水电燃气", "购物", "汽车", "医疗", "其他"];

        // 从 localStorage 读取数据
        function getData() {
            const data = localStorage.getItem(STORAGE_KEY);
            return data ? JSON.parse(data) : [];
        }

        // 保存数据到 localStorage
        function saveData(data) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        // ==================== CRUD 操作 ====================
        let isEditMode = false;
        let currentEditIndex = -1;

        // 添加记录
        function addRecord(record) {
            const data = getData();
            data.push(record);
            saveData(data);
        }

        // 更新记录
        function updateRecord(index, record) {
            const data = getData();
            data[index] = record;
            saveData(data);
        }

        // 删除记录
        function deleteRecord(index) {
            if (confirm('确定要删除这条记录吗？')) {
                const data = getData();
                data.splice(index, 1);
                saveData(data);
                loadBillList();
                loadAnalysis();
            }
        }

        // 获取单条记录
        function getRecord(index) {
            const data = getData();
            return data[index];
        }

        // ==================== UI 操作 ====================
        let pieChart = null;

        // 初始化
        document.addEventListener("DOMContentLoaded", () => {
            initCharts();
            updateCategoryOptions();
            setDefaultDate();
            setDefaultMonth();

            // 监听类型变化
            document.getElementById('type').addEventListener('change', updateCategoryOptions);

            // 监听月份筛选变化
            document.getElementById('monthFilter').addEventListener('change', () => {
                loadBillList();
                loadAnalysis();
            });

            // 表单提交
            document.getElementById('billForm').addEventListener('submit', handleSubmit);

            // 加载数据
            loadBillList();
            loadAnalysis();
        });

        // 初始化图表
        function initCharts() {
            pieChart = echarts.init(document.getElementById('pieChart'));
            window.addEventListener('resize', () => {
                pieChart.resize();
            });
        }

        // 设置默认日期为今天
        function setDefaultDate() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('date').value = today;
        }

        // 设置默认月份为当前月
        function setDefaultMonth() {
            const currentMonth = new Date().toISOString().slice(0, 7);
            document.getElementById('monthFilter').value = currentMonth;
        }

        // 更新分类选项
        function updateCategoryOptions() {
            const type = document.getElementById('type').value;
            const categorySelect = document.getElementById('category');

            categorySelect.innerHTML = '<option value="">请选择分类</option>';

            const categories = type === '收入' ? INCOME_CATEGORIES : EXPENSE_CATEGORIES;

            categories.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat;
                option.textContent = cat;
                categorySelect.appendChild(option);
            });
        }

        // 处理表单提交
        function handleSubmit(e) {
            e.preventDefault();

            const formData = {
                日期: document.getElementById('date').value,
                类型: document.getElementById('type').value,
                分类: document.getElementById('category').value,
                金额: parseFloat(document.getElementById('amount').value).toFixed(2),
                备注: document.getElementById('note').value
            };

            if (isEditMode) {
                // 更新模式
                updateRecord(currentEditIndex, formData);
                alert('账单更新成功！');
                cancelEdit();
            } else {
                // 添加模式
                addRecord(formData);
                alert('账单添加成功！');
                resetForm();
            }

            loadBillList();
            loadAnalysis();
        }

        // 编辑记录
        function editRecord(index) {
            const record = getRecord(index);
            if (!record) return;

            // 填充表单
            document.getElementById('date').value = record.日期;
            document.getElementById('type').value = record.类型;
            updateCategoryOptions();
            document.getElementById('category').value = record.分类;
            document.getElementById('amount').value = record.金额;
            document.getElementById('note').value = record.备注;

            // 切换到编辑模式
            isEditMode = true;
            currentEditIndex = index;
            document.getElementById('submitBtn').textContent = '更新';
            document.getElementById('cancelBtn').style.display = 'block';

            // 滚动到表单
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 取消编辑
        function cancelEdit() {
            isEditMode = false;
            currentEditIndex = -1;
            document.getElementById('submitBtn').textContent = '提交';
            document.getElementById('cancelBtn').style.display = 'none';
            resetForm();
        }

        // 重置表单
        function resetForm() {
            document.getElementById('billForm').reset();
            setDefaultDate();
            updateCategoryOptions();
        }

        // 加载账单列表
        function loadBillList() {
            const month = document.getElementById('monthFilter').value;
            const data = getData();
            const tbody = document.getElementById('billList');

            let filteredData = data;
            if (month) {
                filteredData = data.filter(item => item.日期 && item.日期.startsWith(month));
            }

            // 按日期降序排序
            filteredData.sort((a, b) => new Date(b.日期) - new Date(a.日期));

            tbody.innerHTML = '';

            if (filteredData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">暂无数据</td></tr>';
                return;
            }

            filteredData.forEach((item, index) => {
                // 找到原始数据中的索引
                const originalIndex = data.indexOf(item);

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${item.日期}</td>
                    <td><span class="badge ${item.类型 === '收入' ? 'bg-success' : 'bg-danger'}">${item.类型}</span></td>
                    <td>${item.分类}</td>
                    <td>¥${parseFloat(item.金额).toFixed(2)}</td>
                    <td>${item.备注 || '-'}</td>
                    <td>
                        <div class="action-buttons">
                            <button class="btn btn-sm btn-primary" onclick="editRecord(${originalIndex})">编辑</button>
                            <button class="btn btn-sm btn-danger" onclick="deleteRecord(${originalIndex})">删除</button>
                        </div>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        // 加载分析数据
        function loadAnalysis() {
            const month = document.getElementById('monthFilter').value;
            const data = getData();

            let totalIncome = 0;
            let totalExpense = 0;
            let expenseCategories = {};

            data.forEach(item => {
                if (!month || (item.日期 && item.日期.startsWith(month))) {
                    if (item.类型 === '收入') {
                        totalIncome += parseFloat(item.金额);
                    } else if (item.类型 === '支出') {
                        totalExpense += parseFloat(item.金额);

                        if (!expenseCategories[item.分类]) {
                            expenseCategories[item.分类] = 0;
                        }
                        expenseCategories[item.分类] += parseFloat(item.金额);
                    }
                }
            });

            const balance = totalIncome - totalExpense;

            // 找出支出最高的分类
            let topExpenseCategory = '-';
            let topExpenseAmount = 0;
            const categoryEntries = Object.entries(expenseCategories);
            if (categoryEntries.length > 0) {
                const [topCat, topAmt] = categoryEntries.reduce((a, b) => b[1] > a[1] ? b : a);
                topExpenseCategory = topCat;
                topExpenseAmount = topAmt;
            }

            // 更新统计卡片
            document.getElementById('totalIncome').textContent = `¥${totalIncome.toFixed(2)}`;
            document.getElementById('totalExpense').textContent = `¥${totalExpense.toFixed(2)}`;
            document.getElementById('balance').textContent = `¥${balance.toFixed(2)}`;
            document.getElementById('topExpenseCategory').textContent = topExpenseCategory;
            document.getElementById('topExpenseAmount').textContent = `¥${topExpenseAmount.toFixed(2)}`;

            // 更新图表
            updateCharts(expenseCategories);
        }

        // 更新图表
        function updateCharts(expenseCategories) {
            const data = Object.entries(expenseCategories).map(([name, value]) => ({
                name,
                value: parseFloat(value.toFixed(2))
            }));

            // 按金额降序排序
            data.sort((a, b) => b.value - a.value);

            const option = {
                tooltip: {
                    trigger: 'item',
                    formatter: '{a} <br/>{b}: ¥{c} ({d}%)'
                },
                legend: {
                    orient: 'vertical',
                    left: 'left',
                    top: 'middle'
                },
                series: [
                    {
                        name: '支出分类',
                        type: 'pie',
                        radius: ['40%', '70%'],
                        avoidLabelOverlap: false,
                        itemStyle: {
                            borderRadius: 10,
                            borderColor: '#fff',
                            borderWidth: 2
                        },
                        label: {
                            show: false,
                            position: 'center'
                        },
                        emphasis: {
                            label: {
                                show: true,
                                fontSize: 20,
                                fontWeight: 'bold'
                            }
                        },
                        labelLine: {
                            show: false
                        },
                        data: data
                    }
                ]
            };

            pieChart.setOption(option);
        }

        // 导出数据为 JSON 文件
        function exportData() {
            const data = getData();
            const dataStr = JSON.stringify(data, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `accounting_data_${new Date().toISOString().slice(0, 10)}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
